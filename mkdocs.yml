site_name: diffsan
site_description: A Python CLI tool for AI-assisted code reviews in CI pipelines.
site_url: https://caika-lgtm.github.io/diffsan
repo_url: https://github.com/caika-lgtm/diffsan
repo_name: caika-lgtm/diffsan
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            docstring_style: google
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Configuration: configuration.md
  - Contributing: contributing.md
  - Design:
      - Overview: design/README.md
      - Product Brief: design/00-product-brief.md
      - Architecture: design/01-architecture.md
      - Contracts and Schemas: design/02-contracts-and-schemas.md
      - Artifacts and Events: design/03-artifacts-and-events.md
      - Test Strategy: design/05-test-strategy.md
      - GitLab Integration: design/06-gitlab-integration.md
      - Agent Prompting: design/07-agent-prompting.md
      - Decision Log: design/08-decision-log.md
